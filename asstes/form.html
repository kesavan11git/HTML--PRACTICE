<!doctype html>
<html>

<head>
    <title> form creation</title>
</head>

<body>
    <h1>PRODUCT DETAILS</h1>
    <div>
        <form method="post" enctype="multipart/form-data">
            <table>
                <tr>
                    <td><label for="Product id">Product Id</label></td>
                    <td><input type="text" id="Product id" name="Product id" /></td>
                </tr>
                <tr>
                    <td><label for="product name">Product Name</label></td>
                    <td><input type="text" id="product name" name="product name"></td>
                </tr>
                <tr>
                    <td><label for="">Category</label></td>
                    <td><select>
                            <option>Enter Category</option>
                            <option>dress</option>
                            <option>snacks</option>

                        </select></td>
                </tr>
                <tr>
                    <td>
                        <label for="manufactuirng date">manufacturing date</label>
                    </td>
                    <td> <input type="date" id="manufacturing date" name="manufacturing date" />
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="expiry">Expiry date</label>
                    </td>
                    <td><input type="date" id="expiry" name="expiry date" /></td>
                </tr>
                <tr>
                    <td>
                        <label for="product quanlity">product quality</label>
                    </td>
                    <td>
                        <select name="product quanlity">
                            <option>please enter your quality</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="image">product image</label>
                    </td>
                    <td>
                        <input type="file" id="image" name="product image" />
                    </td>
                </tr>

                <tr>
                    <td><label for="">Price</label></td>
                    <td><input type="number" id="price" name="price" /></td>
                </tr>
                <tr>
                    <td>
                        <label for="contact">contact us</label>
                    </td>
                    <td>
                        <input type="Email" id="contact" name="contact" />
                    </td>
                </tr>
                <tr>
                    <td>
                        <button type="submit">submit</button>
                </tr>

            </table>
        </form>
    </div>
</body>

</html>
