<!doctype html>
<html>

<head>
    <title> form creation</title>
    <style>
        h1 {
            text-align: center;
        }

        .forms {
            display: flex;
            justify-content: center;
        }

        table {
            background-color: orange;
            color: white;

        }

        .label1 {
            font-size: larger;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-align: left;

        }

        .input {
            text-align: end;
        }
        
    </style>
</head>

<body>
    <div>
        <h1>PRODUCT DETAILS</h1>
    </div>
    <div class="forms">
        <form method="post" enctype="multipart/form-data">
            <table style="text-align: center; border-spacing:100px 20px ;">
                <tr>
                    <td class="label1"><label for="Product id">Product Id</label></td>
                    <td class="input1"><input type="text" id="Product id" name="Product id" /></td>
                </tr>
                <tr>
                    <td class="label1"><label for="product name">Product Name</label></td>
                    <td class="input1"><input type="text" id="product name" name="product name"></td>
                </tr>
                <tr>
                    <td class="label1"><label for="">Category</label></td>
                    <td class="input1"><select name="category">
                            <option value="">Enter Category</option>
                            <option value="dress">dress</option>
                            <option value="snacks">snacks</option>

                        </select></td>
                </tr>
                <tr>
                    <td class="label1">
                        <label for="manufactuirng date">manufacturing date</label>
                    </td>
                    <td class="input1"> <input type="date" id="manufacturing date" name="manufacturing date" />
                    </td>
                </tr>
                <tr>
                    <td class="label1">
                        <label for="expiry">Expiry date</label>
                    </td>
                    <td class="input1"><input type="date" id="expiry" name="expiry date" /></td>
                </tr>
                <tr>
                    <td class="label1">
                        <label for="product quality">product quality</label>
                    </td>
                    <td class="input1">
                        <select name="product quality">
                            <option value="">please enter your quality</option>
                            <option value="first quality">first quality</option>
                            <option value="second quality">second quality</option>
                            <option value="third quality">third quality</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td class="label1">
                        <label for="image">product image</label>
                    </td>
                    <td class="input1">
                        <input type="file" id="image" name="product image" />
                    </td>
                </tr>

                <tr>
                    <td class="label1"><label for="">Price</label></td>
                    <td class="input1"><input type="number" id="price" name="price" /></td>
                </tr>
                <tr>
                    <td class="label1">
                        <label for="contact">contact us</label>
                    </td>
                    <td class="input1">
                        <input type="Email" id="contact" name="contact" />
                    </td>
                </tr>
                <tr>
                    <td>
                        <button type="submit">submit</button></td>
                        <td>
                            <button type="reset">reset</button>
                        </td>
                </tr>
                

            </table>
        </form>
    </div>
</body>

</html>
